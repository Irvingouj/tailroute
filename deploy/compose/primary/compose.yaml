# Example host-network deploy on a Tailscale node.
# Copy this directory, set secrets via env file, edit *.toml for your TS IP / DNS zone.
#
#   export TAILSVC_ADMIN_TOKEN="$(openssl rand -hex 24)"
#   export TAILSVC_CONTROLLER="http://100.x.y.z:18080"
#   echo "$TAILSVC_ADMIN_TOKEN" > admin_token
#   docker compose up -d

name: tailsvc

services:
  controller:
    build:
      context: ../../..
      dockerfile: deploy/docker/Dockerfile
    image: tailsvc:local
    network_mode: host
    restart: unless-stopped
    environment:
      TAILSVC_CONFIG: /etc/tailsvc/controller.toml
      RUST_LOG: info,tailsvc_dns=info,tailsvc_controller=info
    volumes:
      - ./controller.toml:/etc/tailsvc/controller.toml:ro
      - ./admin_token:/etc/tailsvc/admin_token:ro
      - controller-data:/var/lib/tailsvc-controller
    cap_add:
      - NET_BIND_SERVICE
    command: ["/usr/local/bin/tailsvc-controller"]

  agent:
    image: tailsvc:local
    network_mode: host
    restart: unless-stopped
    depends_on:
      - controller
    environment:
      TAILSVC_CONFIG: /etc/tailsvc/agent.toml
      # Must be provided by operator (compose does not ship real secrets).
      TAILSVC_ADMIN_TOKEN: ${TAILSVC_ADMIN_TOKEN:?set TAILSVC_ADMIN_TOKEN}
      TAILSVC_CONTROLLER: ${TAILSVC_CONTROLLER:?set TAILSVC_CONTROLLER}
      RUST_LOG: info,tailsvc_agent=info,tailsvc_proxy=info
    volumes:
      - ./agent.toml:/etc/tailsvc/agent.toml:ro
      - ./agent-entrypoint.sh:/entrypoint/agent-entrypoint.sh:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - agent-data:/var/lib/tailsvc-agent
    cap_add:
      - NET_BIND_SERVICE
    entrypoint: ["/bin/sh", "/entrypoint/agent-entrypoint.sh"]

  whoami:
    image: traefik/whoami:v1.10.1
    restart: unless-stopped
    labels:
      tailsvc.enable: "true"
      tailsvc.hosts: "whoami.services.example"
      tailsvc.port: "80"

volumes:
  controller-data:
  agent-data:
