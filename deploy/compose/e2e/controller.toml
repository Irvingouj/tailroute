[dns]
listen = "0.0.0.0:5353"
upstreams = ["1.1.1.1:53", "8.8.8.8:53"]
service_ttl_seconds = 2
upstream_timeout_ms = 2000
positive_cache_max_seconds = 300
negative_cache_max_seconds = 30
query_timeout_ms = 5000

[api]
listen = "0.0.0.0:8080"
admin_token_file = "/etc/tailsvc/admin_token"

[storage]
sqlite_path = "/var/lib/tailsvc-controller/controller.db"

[leases]
# Short TTL for faster lease-expiry e2e (SPEC defaults are 20/90).
heartbeat_interval_seconds = 5
agent_ttl_seconds = 15

[backup]
enabled = false
dir = "/tmp/tailsvc-backups"
interval_seconds = 3600
keep = 3

[security]
# e2e registers example.org shadow — leave allowlist empty
