name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test (unit + in-process)
        run: |
          cargo test -p tailsvc-common -p tailsvc-docker --lib
          cargo test -p tailsvc-agent --bin tailsvc-agent
          cargo test -p tailsvc-integration-tests --tests

  docker:
    name: docker build
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: false
          tags: tailsvc:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  e2e:
    name: compose e2e
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run compose e2e
        run: |
          chmod +x deploy/compose/e2e/run-e2e.sh deploy/compose/e2e/agent-entrypoint.sh
          # Non-interactive: run-e2e tears down when not a TTY
          ./deploy/compose/e2e/run-e2e.sh
